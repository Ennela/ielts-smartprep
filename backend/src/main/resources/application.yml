server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ielts_smartprep}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:default-secret-key-change-in-production-min-32-characters}
    expiration-ms: 86400000  # 24 hours
  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash
    timeout-seconds: 30
    max-retries: 3
  rate-limit:
    capacity: 10
    refill-tokens: 10
    refill-duration-minutes: 1

management:
  endpoints:
    web:
      exposure:
        include: health

# --- Swagger / OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# --- Resilience4j Circuit Breaker & Retry ---
resilience4j:
  circuitbreaker:
    instances:
      gemini:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 2
        minimumNumberOfCalls: 3
  timelimiter:
    instances:
      gemini:
        timeoutDuration: 35s
  retry:
    instances:
      gemini:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - com.smartprep.exception.InvalidAiResponseException
          - com.smartprep.exception.AiServiceException
