server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ielts_smartprep}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  cache:
    type: redis
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  jwt:
    secret: ${JWT_SECRET:default-secret-key-change-in-production-min-32-characters}
    expiration-ms: 900000  # 15 minutes (access token)
    refresh-expiration-ms: 604800000  # 7 days (refresh token)
  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash
    timeout-seconds: 60
    max-retries: 3
  tts:
    enabled: ${TTS_ENABLED:true}
    edge-tts-url: ${EDGE_TTS_URL:http://localhost:8000}
    speaking-rate: -8%  # edge-tts rate offset format (-8% matches standard IELTS speed)
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:listening-audio}
  rate-limit:
    capacity: 10
    refill-tokens: 10
    refill-duration-minutes: 1
    daily-capacity: 50
  security:
    max-login-attempts: 5
    lockout-duration-minutes: 15
  mail:
    from: ${MAIL_USERNAME:noreply@smartprep.com}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

# --- Sentry ---
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENV:development}
  traces-sample-rate: 0.2
  send-default-pii: false
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: warn

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# --- Swagger / OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# --- Resilience4j Circuit Breaker & Retry ---
resilience4j:
  circuitbreaker:
    instances:
      gemini:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 60
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
  timelimiter:
    instances:
      gemini:
        timeoutDuration: 65s
  retry:
    instances:
      gemini:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - com.smartprep.exception.InvalidAiResponseException
          - com.smartprep.exception.AiServiceException
