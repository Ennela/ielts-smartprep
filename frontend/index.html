<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- FOUC prevention: apply dark theme before CSS loads -->
    <script>
      (function(){
        var t = localStorage.getItem('smartprep-theme') || 'light';
        if (t === 'system') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
      })();
    </script>
    <title>IELTS SmartPrep - Nền tảng Luyện thi IELTS bằng AI</title>
    <meta name="description" content="Luyện thi IELTS Reading, Writing và Listening với nội dung do AI tạo và phản hồi tức thì." />
    <!-- Academic Precision Design System Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
